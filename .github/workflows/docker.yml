name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Build image
        run: |
          nix build .#sunset-relay-docker
          docker load < result
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-amd64
          path: result

  arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Build image
        run: |
          nix build .#sunset-relay-docker
          docker load < result
      - uses: actions/upload-artifact@v4
        with:
          name: docker-image-arm64
          path: result

  push:
    needs: [amd64, arm64]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/download-artifact@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push multi-arch manifest
        run: |
          set -euo pipefail
          TAG_PREFIX=${GITHUB_REF#refs/*/}-${{ github.run_id }}
          ARCHS=(amd64 arm64)
          IMAGES=()

          for arch in "${ARCHS[@]}"; do
            CONTAINER_WITH_TAG=$(docker load < docker-image-$arch/result | tail -n1 | rev | cut -d' ' -f1 | rev)
            CONTAINER=$(echo "$CONTAINER_WITH_TAG" | cut -d: -f1)

            IMAGE="localhost:5000/$CONTAINER:${TAG_PREFIX}-$arch"
            docker tag "$CONTAINER_WITH_TAG" "$IMAGE"
            docker push "$IMAGE"

            IMAGES+=("$IMAGE")
          done

          docker buildx imagetools create \
            -t ghcr.io/nicolaschan/$CONTAINER:latest \
            -t ghcr.io/nicolaschan/$CONTAINER:${TAG_PREFIX} \
            "${IMAGES[@]}"
