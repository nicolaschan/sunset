name: Tests

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: cargo fmt --all --check
        run: |
          nix develop --command cargo fmt --all --check
      - name: cargo test --workspace --all-features
        run: |
          nix develop --command cargo test --workspace --all-features

  gleam:
    name: Gleam unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: gleam format --check
        run: |
          nix develop --command bash -c 'cd web && gleam format --check src test'
      - name: gleam test
        run: |
          nix develop --command bash -c 'cd web && gleam test'

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Build web bundle
        run: nix build .#web
      - name: Run Playwright suite
        run: nix run .#web-test
      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            web/test-results
            web/playwright-report
          if-no-files-found: ignore
          retention-days: 14
