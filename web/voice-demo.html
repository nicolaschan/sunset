<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sunset-voice loopback demo (C2a)</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 32rem;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      button {
        padding: 0.5rem 1rem;
        margin-right: 0.5rem;
        font-size: 1rem;
      }
      #log {
        margin-top: 1rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        max-height: 20rem;
        overflow: auto;
        background: #f4f4f4;
        padding: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>sunset-voice loopback (C2a)</h1>
    <p>
      Mic → Opus encode → in-Rust loopback queue → Opus decode → speakers.
      Speak into the mic; you should hear yourself with audible latency
      (~50–100 ms). No networking, no encryption.
    </p>
    <button id="start">Start</button>
    <button id="stop" disabled>Stop</button>
    <div id="log"></div>

    <script type="module">
      import init, { Client } from "./build/dev/javascript/sunset_web_wasm.js";

      const log = (msg) => {
        const el = document.getElementById("log");
        if (el) {
          el.textContent += msg + "\n";
          el.scrollTop = el.scrollHeight;
        }
        // eslint-disable-next-line no-console
        console.log("[voice-demo]", msg);
      };

      // Surface any uncaught errors / unhandled rejections to the on-page
      // log so we don't silently fail before the user can see what broke.
      window.addEventListener("error", (e) => {
        log("uncaught error: " + (e.error?.stack || e.message));
      });
      window.addEventListener("unhandledrejection", (e) => {
        log("unhandled rejection: " + (e.reason?.stack || e.reason));
      });

      log("module loaded; init=" + typeof init + " Client=" + typeof Client);

      let client = null;
      let audioCtx = null;
      let captureNode = null;
      let playbackNode = null;
      let micStream = null;

      async function start() {
        document.getElementById("start").disabled = true;
        try {
          // 1. WASM bootstrap. Pass the .wasm URL explicitly — the
          //    default import.meta.url-based lookup is unreliable
          //    across some bundler/server combos (per the existing
          //    Gleam FFI's comment).
          await init("./build/dev/javascript/sunset_web_wasm_bg.wasm");
          log("wasm initialised");

          // 2. Construct a Client. The room name is irrelevant for
          //    C2a — voice doesn't touch Bus yet.
          const seed = new Uint8Array(32);
          crypto.getRandomValues(seed);
          client = new Client(seed, "voice-demo");
          log("client constructed");

          // 3. Get the mic at 48 kHz mono with browser-side cleanup.
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              sampleRate: 48000,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: true,
            },
          });
          log("mic acquired");

          // 4. AudioContext at 48 kHz so we never resample.
          audioCtx = new AudioContext({ sampleRate: 48000 });
          await audioCtx.audioWorklet.addModule("audio/voice-capture-worklet.js");
          await audioCtx.audioWorklet.addModule("audio/voice-playback-worklet.js");
          log("worklets loaded");

          // 5. Build the playback node FIRST so we can hand its port to
          //    the voice_start handler.
          playbackNode = new AudioWorkletNode(audioCtx, "voice-playback", {
            numberOfInputs: 0,
            numberOfOutputs: 1,
            outputChannelCount: [1],
          });
          playbackNode.connect(audioCtx.destination);

          // 6. Voice subsystem: Rust will call this handler with each
          //    decoded frame; we forward to the playback worklet.
          client.voice_start((pcm) => {
            playbackNode.port.postMessage(pcm);
          });
          log("voice_start ok");

          // 7. Capture node: receives 960-sample frames via its port,
          //    forwards each to client.voice_input.
          captureNode = new AudioWorkletNode(audioCtx, "voice-capture", {
            numberOfInputs: 1,
            numberOfOutputs: 0,
          });
          captureNode.port.onmessage = (e) => {
            try {
              client.voice_input(e.data);
            } catch (err) {
              log("voice_input error: " + err);
            }
          };

          // 8. Wire mic → capture worklet.
          const source = audioCtx.createMediaStreamSource(micStream);
          source.connect(captureNode);
          log("audio pipeline live — speak into the mic");

          document.getElementById("stop").disabled = false;
        } catch (err) {
          log("start failed: " + err);
          document.getElementById("start").disabled = false;
        }
      }

      async function stop() {
        document.getElementById("stop").disabled = true;
        try {
          if (client) {
            client.voice_stop();
            log("voice_stop ok");
          }
          if (captureNode) {
            captureNode.disconnect();
            captureNode = null;
          }
          if (playbackNode) {
            playbackNode.disconnect();
            playbackNode = null;
          }
          if (audioCtx) {
            await audioCtx.close();
            audioCtx = null;
          }
          if (micStream) {
            for (const t of micStream.getTracks()) t.stop();
            micStream = null;
          }
          client = null;
          log("stopped");
        } catch (err) {
          log("stop failed: " + err);
        }
        document.getElementById("start").disabled = false;
      }

      document.getElementById("start").addEventListener("click", start);
      document.getElementById("stop").addEventListener("click", stop);
    </script>
  </body>
</html>
