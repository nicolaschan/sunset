<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source SVG for the home-screen / PWA install icon. Same composition
  as `favicon.svg` (sunset gradient + sun + horizon) but rendered as a
  full-bleed square so iOS / Android can apply their own corner mask
  without leaving a transparent gap at the corners. Don't add `rx` to
  the background rect — the OS rounds the icon itself, and a manual
  rx underneath produces a visible double-rounded edge.

  Built into apple-touch-icon.png (180×180) plus icon-192.png and
  icon-512.png (manifest sizes) by the flake's webDist installPhase.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a3a52"/>
      <stop offset="0.55" stop-color="#bb5a3a"/>
      <stop offset="1" stop-color="#e89a6a"/>
    </linearGradient>
  </defs>
  <rect width="28" height="28" fill="url(#sky)"/>
  <circle cx="14" cy="15" r="6.5" fill="#f0c060" opacity="0.32"/>
  <circle cx="14" cy="15" r="3.8" fill="#f0c060"/>
  <line x1="3" y1="20.5" x2="25" y2="20.5" stroke="#f8f2ec" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="6" y1="24" x2="22" y2="24" stroke="#f8f2ec" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
</svg>
