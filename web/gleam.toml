name = "sunset_web"
version = "0.1.0"
target = "javascript"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
lustre = ">= 5.6.0 and < 6.0.0"
modem = ">= 2.1.2 and < 3.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.3.0 and < 3.0.0"

[tools.lustre.dev]
host = "0.0.0.0"

[tools.lustre.html]
title = "sunset.chat"

[[tools.lustre.html.links]]
rel = "icon"
href = "favicon.svg"
type = "image/svg+xml"

# Apple home-screen icon (iOS Safari).
# The PNG is baked from priv/apple-touch-icon.svg by the flake's
# webDist installPhase via rsvg-convert. Apple touch icons must be
# fully opaque PNGs — iOS applies its own rounded mask, so a
# transparent background renders black at the corners.
[[tools.lustre.html.links]]
rel = "apple-touch-icon"
href = "apple-touch-icon.png"
sizes = "180x180"

# PWA manifest. Drives Add-to-Home-Screen on Chrome/Android and the
# install banner across browsers. Referenced icon files (180/192/512)
# are baked from the same SVG source in installPhase.
[[tools.lustre.html.links]]
rel = "manifest"
href = "manifest.webmanifest"

[[tools.lustre.html.links]]
rel = "preconnect"
href = "https://fonts.googleapis.com"

[[tools.lustre.html.links]]
rel = "preconnect"
href = "https://fonts.gstatic.com"
crossorigin = ""

# Inter + JetBrains Mono are the prose / mono faces. Noto Color Emoji
# is appended to give us a consistent emoji rendering across hosts —
# without it, the same emoji renders very differently on macOS (Apple
# Color Emoji), Windows (Segoe UI Emoji), Linux (whatever the distro
# ships, often a black-and-white fallback), and Android. The browser
# falls through font-family entries glyph-by-glyph, so listing the
# emoji font after Inter / JetBrains Mono in `theme.gleam` keeps Latin
# text on Inter / JetBrains Mono while emoji codepoints hit the
# Google Fonts copy. We bundle the file via the existing Google Fonts
# CSS request rather than self-hosting so the same `preconnect` covers
# the fetch and there's no extra build / asset pipeline to maintain.
[[tools.lustre.html.links]]
rel = "stylesheet"
href = "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Color+Emoji&display=swap"

# theme-color paints the browser-chrome (URL bar, address bar) with
# the sunset accent colour. Not split light/dark — the deep magenta-rose
# reads correctly under either system theme. Keep this in sync with
# `theme.gleam`'s light-palette `accent` token.
[[tools.lustre.html.meta]]
name = "theme-color"
content = "#a83565"

# Standalone display when the page is launched from the home screen
# (PWA install). The `apple-mobile-web-app-*` variants are Apple's
# legacy spelling, kept alongside the modern `mobile-web-app-capable`
# for older iOS that still parses the `apple-` prefix.
[[tools.lustre.html.meta]]
name = "mobile-web-app-capable"
content = "yes"

[[tools.lustre.html.meta]]
name = "apple-mobile-web-app-capable"
content = "yes"

# Status-bar theme on iOS Safari while the PWA is open. Translucent
# lets the page bleed under the bar so the sunset gradient is what
# the user sees behind the clock — instead of a hard black band.
[[tools.lustre.html.meta]]
name = "apple-mobile-web-app-status-bar-style"
content = "black-translucent"

# Short title that appears under the home-screen icon on iOS
# (defaults to the page title otherwise; `sunset.chat` would render
# truncated under the icon).
[[tools.lustre.html.meta]]
name = "apple-mobile-web-app-title"
content = "sunset"
