<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>sunset-voice E2E harness</title>
  </head>
  <body>
    <h1>sunset-voice E2E harness</h1>
    <p>This page is exercised by Playwright; do not load it manually.</p>
    <script type="module">
      import init, { Client } from "/sunset_web_wasm.js";

      const voiceState = new Map();
      const connState = new Map();

      function hex(uint8) {
        return Array.from(uint8).map((b) => b.toString(16).padStart(2, "0")).join("");
      }

      function hexBytes(s) {
        return new Uint8Array(s.match(/.{2}/g).map((b) => parseInt(b, 16)));
      }

      window.__voice = {
        async start({ seed, room, relay }) {
          await init();
          const bytes = new Uint8Array(seed.match(/.{2}/g).map((b) => parseInt(b, 16)));
          // Multi-room API: `Client.open(seed, hb)` opens the IndexedDB
          // store and constructs a client wired into it; the room is
          // opened via client.open_room(name) which publishes the
          // <fp>/* subscription internally.
          const client = await Client.open(bytes, 0);
          window.__voice.client = client;
          window.__voice.room = room;
          window.__voice.publicKeyHex = hex(new Uint8Array(client.public_key));
          await client.add_relay(relay);
          const roomHandle = await client.open_room(room);
          window.__voice.roomHandle = roomHandle;
          client.on_intent_changed((snap) => {
            connState.set(snap.label, snap);
          });
          return { publicKey: window.__voice.publicKeyHex };
        },
        startVoice() {
          // Start voice first, then install recorder so all frames are captured.
          window.__voice.client.voice_start(
            window.__voice.roomHandle,
            // on_pcm: ignored in harness — recorder captures via frame recorder
            () => {},
            // on_drop_peer: ignored
            () => {},
            // on_voice_peer_state
            (peerId, in_call, talking, is_muted) => {
              const k = hex(new Uint8Array(peerId));
              voiceState.set(k, { in_call, talking, is_muted });
            },
            // on_set_peer_volume: ignored in harness
            () => {},
          );
          // Install recorder after start so the runtime's frame sink can be wrapped.
          window.__voice.client.voice_install_frame_recorder();
        },
        recordedFor(hexPeerId) {
          const bytes = hexBytes(hexPeerId);
          return window.__voice.client.voice_recorded_frames(bytes);
        },
        stop() {
          window.__voice.client.voice_stop();
        },
        injectPcm(samples) {
          window.__voice.client.voice_inject_pcm(new Float32Array(samples));
        },
        voiceStateFor(hexPeerId) {
          return voiceState.get(hexPeerId) ?? null;
        },
        connStateForAddr(addr) {
          return connState.get(addr) ?? null;
        },
        peerMode(peerHex) {
          const bytes = new Uint8Array(peerHex.match(/.{2}/g).map((b) => parseInt(b, 16)));
          return window.__voice.roomHandle.peer_connection_mode(bytes);
        },
        async startPresence() {
          // Tight intervals so the membership tracker converges quickly
          // in the test (real Gleam UI uses 30s/60s/5s defaults).
          await window.__voice.roomHandle.start_presence(300, 1500, 100);
        },
      };
    </script>
  </body>
</html>
